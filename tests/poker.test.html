<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pushup Poker — evaluator tests</title>
  <style>
    body { font: 15px/1.5 -apple-system, system-ui, sans-serif; background: #14181c; color: #eef2f5; padding: 20px; max-width: 720px; margin: auto; }
    h1 { font-size: 1.3rem; }
    .row { padding: 4px 8px; border-radius: 6px; font-family: ui-monospace, Menlo, monospace; font-size: 13px; }
    .ok { color: #6ee7a8; }
    .fail { color: #ff8b7d; background: #3a1f1c; }
    #summary { font-size: 1.15rem; font-weight: 800; margin: 14px 0; }
    .pass { color: #6ee7a8; } .some { color: #ff8b7d; }
  </style>
</head>
<body>
  <h1>Pushup Poker — hand evaluator tests 🃏</h1>
  <p>Open this file over a local server (e.g. <code>python3 -m http.server</code>) so ES modules load.</p>
  <div id="summary">running…</div>
  <div id="out"></div>

  <script type="module">
    import { evaluate, decideWinners, compareScores, makeDeck } from '../js/poker.js';

    const out = document.getElementById('out');
    let pass = 0, fail = 0;
    function ok(name, cond) {
      const d = document.createElement('div');
      d.className = 'row ' + (cond ? 'ok' : 'fail');
      d.textContent = (cond ? '  ok   ' : '  FAIL ') + name;
      out.appendChild(d);
      cond ? pass++ : fail++;
    }
    const ev = (c) => evaluate(c);

    ok('deck has 54 cards', makeDeck().length === 54);
    ok('deck has 2 jokers', makeDeck().filter(c => c[0] === '*').length === 2);

    ok('royal = straight flush cat9', ev(['As','Ks','Qs','Js','Ts','2h','3d']).category === 9);
    ok('quads cat8', ev(['Ah','Ad','Ac','As','Kd','2c','7h']).category === 8);
    ok('full house cat7', ev(['Ah','Ad','Ac','Kd','Ks','2c','7h']).category === 7);
    ok('flush cat6', ev(['2h','5h','9h','Jh','Kh','As','3d']).category === 6);
    ok('wheel straight cat5', ev(['Ah','2d','3c','4s','5h','Kd','9c']).category === 5);
    ok('wheel is 5-high (loses to 6-high)',
       compareScores(ev(['6h','2d','3c','4s','5h','Kd','9c']).score,
                     ev(['Ah','2d','3c','4s','5h','Kd','9c']).score) > 0);
    ok('trips cat4', ev(['Ah','Ad','Ac','Kd','Qs','2c','7h']).category === 4);
    ok('two pair cat3', ev(['Ah','Ad','Kc','Kd','Qs','2c','7h']).category === 3);
    ok('one pair cat2', ev(['Ah','Ad','Kc','Jd','Qs','2c','7h']).category === 2);
    ok('high card cat1', ev(['Ah','9d','Kc','Jd','Qs','2c','7h']).category === 1);
    ok('higher flush wins on kicker (953 beats 952)',
       compareScores(ev(['Ah','Kh','9h','5h','3h','2d','4c']).score,
                     ev(['Ah','Kh','9h','5h','2h','3d','4c']).score) > 0);

    // jokers
    ok('joker completes flush', ev(['2h','5h','9h','Jh','*1','As','3d']).category === 6);
    ok('joker completes a straight', ev(['9c','Th','Jd','Qs','*1','2h','7d']).category === 5);
    ok('four aces via joker', ev(['Ah','Ad','Ac','*1','Kd','2c','7h']).category === 8);
    ok('FIVE OF A KIND via joker beats royal',
       ev(['Ah','Ad','Ac','As','*1','2c','7h']).category === 10 &&
       compareScores(ev(['Ah','Ad','Ac','As','*1','2c','7h']).score,
                     ev(['As','Ks','Qs','Js','Ts','2h','3d']).score) > 0);
    ok('two jokers make broadway straight', ev(['Ah','Kd','Qc','*1','*2','2s','7h']).category === 5);
    ok('natural quads use 0 jokers', ev(['Ah','Ad','Ac','As','Kd','2c','7h']).jokersUsed === 0);
    ok('quads-with-joker use 1 joker', ev(['Ah','Ad','Ac','*1','Kd','2c','7h']).jokersUsed === 1);

    // house rule: more jokers loses
    ok('four aces: 0-joker beats 1-joker (more jokers loses)',
       compareScores(ev(['Ah','Ad','Ac','As','Kd','2c','7h']).score,
                     ev(['Ah','Ad','Ac','*1','Kd','2c','7h']).score) > 0);
    {
      const r = decideWinners({
        alice: ['Ah','Ad','Ac','As','Kd','2c','7h'],
        bob:   ['Ah','Ad','Ac','*1','Kd','2c','7h'],
        cara:  ['Kh','Kd','Kc','Ks','Qd','2c','7h'],
      });
      ok('winner is 0-joker four aces (alice)', r.winners.length === 1 && r.winners[0] === 'alice');
    }
    {
      const r = decideWinners({
        x: ['Ah','Ad','Ac','As','Kh','2c','7d'],
        y: ['As','Ac','Ad','Ah','Kd','2s','7h'],
      });
      ok('true tie splits', r.winners.length === 2);
    }

    const s = document.getElementById('summary');
    s.textContent = `${pass} passed, ${fail} failed`;
    s.className = fail ? 'some' : 'pass';
  </script>
</body>
</html>
